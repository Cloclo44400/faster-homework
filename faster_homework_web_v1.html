<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faster Homework</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b0d14;
    --bg2: #13161f;
    --bg3: #1c2030;
    --accent: #7c6dfa;
    --accent2: #b8aeff;
    --text: #e2e8f0;
    --dim: #4a5068;
    --success: #34d399;
    --danger: #f87171;
    --border: #252840;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 36px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.4rem;
    color: var(--accent2);
    letter-spacing: -0.5px;
  }

  .logo span { color: var(--accent); }

  .status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--dim);
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--dim);
    transition: background 0.4s;
  }
  .dot.ok { background: var(--success); box-shadow: 0 0 8px var(--success); }
  .dot.err { background: var(--danger); }

  /* TABS */
  nav {
    display: flex;
    gap: 0;
    padding: 0 36px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }

  .tab-btn {
    background: none;
    border: none;
    color: var(--dim);
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    padding: 14px 24px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }

  .tab-btn:hover { color: var(--text); }
  .tab-btn.active {
    color: var(--accent2);
    border-bottom-color: var(--accent);
  }

  /* MAIN */
  main { padding: 32px 36px; max-width: 1100px; margin: 0 auto; }

  .tab-content { display: none; animation: fadeIn 0.25s ease; }
  .tab-content.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* TEXTES TAB */
  .textes-layout {
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 16px;
    height: 520px;
  }

  .textes-list {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow-y: auto;
    padding: 8px;
  }

  .textes-list h3 {
    font-size: 0.7rem;
    font-family: 'Space Mono', monospace;
    color: var(--dim);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 10px 12px 8px;
  }

  .article-btn {
    display: block;
    width: 100%;
    background: none;
    border: none;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 0.88rem;
    text-align: left;
    padding: 10px 14px;
    border-radius: 7px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .article-btn:hover { background: var(--bg3); color: var(--accent2); }
  .article-btn.active { background: var(--accent); color: white; }

  .textes-content {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .content-bar {
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--dim);
  }

  #text-area {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
  }

  .placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 10px;
    color: var(--dim);
  }

  .placeholder .icon { font-size: 2.5rem; opacity: 0.4; }
  .placeholder p { font-size: 0.85rem; }

  /* IMAGES TAB */
  .images-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
  }

  .img-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
  }

  .img-card:hover {
    transform: translateY(-3px);
    border-color: var(--accent);
  }

  .img-thumb {
    width: 100%;
    height: 160px;
    object-fit: cover;
    display: block;
    background: var(--bg3);
  }

  .img-placeholder {
    width: 100%;
    height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg3);
    color: var(--dim);
    font-size: 2rem;
  }

  .img-label {
    padding: 10px 14px;
    font-size: 0.82rem;
    color: var(--dim);
    font-family: 'Space Mono', monospace;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* FICHIERS TAB */
  .fichier-row {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 22px;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }

  .fichier-row:hover { border-color: var(--accent); }

  .fichier-icon {
    font-size: 1.8rem;
    flex-shrink: 0;
  }

  .fichier-info { flex: 1; overflow: hidden; }

  .fichier-name {
    font-weight: 600;
    font-size: 0.95rem;
    margin-bottom: 4px;
  }

  .fichier-url {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    color: var(--dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .dl-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px 18px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .dl-btn:hover { background: var(--accent2); color: var(--bg); }
  .dl-btn.done { background: var(--success); cursor: default; }

  /* EMPTY / ERROR */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--dim);
    font-size: 0.9rem;
  }

  .empty .e-icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.3; }

  /* LOADER */
  .loader {
    display: inline-block;
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">⚡ <span>Faster</span> Homework</div>
  <div class="status">
    <div class="dot" id="dot"></div>
    <span id="status-lbl">Chargement…</span>
  </div>
</header>

<nav>
  <button class="tab-btn active" onclick="switchTab('textes', this)">📄 Textes</button>
  <button class="tab-btn" onclick="switchTab('images', this)">🖼️ Images</button>
  <button class="tab-btn" onclick="switchTab('fichiers', this)">📦 Fichiers</button>
</nav>

<main>
  <!-- TEXTES -->
  <div class="tab-content active" id="tab-textes">
    <div class="textes-layout">
      <div class="textes-list">
        <h3>Articles</h3>
        <div id="article-list"><div style="padding:14px;color:var(--dim)"><div class="loader"></div></div></div>
      </div>
      <div class="textes-content">
        <div class="content-bar" id="content-bar">— Sélectionne un article</div>
        <div id="text-area">
          <div class="placeholder">
            <div class="icon">📄</div>
            <p>Clique sur un article pour l'afficher</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- IMAGES -->
  <div class="tab-content" id="tab-images">
    <div class="images-grid" id="images-grid">
      <div style="color:var(--dim);display:flex;gap:10px;align-items:center"><div class="loader"></div> Chargement…</div>
    </div>
  </div>

  <!-- FICHIERS -->
  <div class="tab-content" id="tab-fichiers">
    <div id="fichiers-list">
      <div style="color:var(--dim);display:flex;gap:10px;align-items:center"><div class="loader"></div> Chargement…</div>
    </div>
  </div>
</main>

<script>
const DATA_URL = "https://raw.githubusercontent.com/Cloclo44400/faster-homework/main/data.json";

function switchTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

function setStatus(txt, state) {
  const dot = document.getElementById('dot');
  const lbl = document.getElementById('status-lbl');
  lbl.textContent = txt;
  dot.className = 'dot ' + state;
}

async function loadText(url, nom, btn) {
  document.querySelectorAll('.article-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const area = document.getElementById('text-area');
  const bar = document.getElementById('content-bar');
  bar.textContent = nom;
  area.innerHTML = '<div class="placeholder"><div class="loader"></div></div>';
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const txt = await r.text();
    area.textContent = txt;
  } catch(e) {
    area.innerHTML = `<div class="placeholder"><div class="icon">❌</div><p>Erreur : ${e.message}</p></div>`;
  }
}

function populateTextes(data) {
  const list = document.getElementById('article-list');
  const items = data.textes || [];
  if (!items.length) {
    list.innerHTML = '<div style="padding:14px;color:var(--dim);font-size:.82rem">Aucun texte</div>';
    return;
  }
  list.innerHTML = '';
  items.forEach(item => {
    const btn = document.createElement('button');
    btn.className = 'article-btn';
    btn.textContent = item.nom;
    btn.onclick = () => loadText(item.url, item.nom, btn);
    list.appendChild(btn);
  });
}

function populateImages(data) {
  const grid = document.getElementById('images-grid');
  const items = data.images || [];
  if (!items.length) {
    grid.innerHTML = '<div class="empty"><div class="e-icon">🖼️</div><p>Aucune image disponible</p></div>';
    return;
  }
  grid.innerHTML = '';
  items.forEach(item => {
    const card = document.createElement('div');
    card.className = 'img-card';
    card.innerHTML = `
      <div class="img-placeholder" id="ph-${Math.random().toString(36).slice(2)}">⏳</div>
      <div class="img-label">${item.nom}</div>
    `;
    const ph = card.querySelector('.img-placeholder');
    const img = new Image();
    img.onload = () => {
      img.className = 'img-thumb';
      ph.replaceWith(img);
    };
    img.onerror = () => { ph.textContent = '❌'; };
    img.src = item.url;
    grid.appendChild(card);
  });
}

function populateFichiers(data) {
  const list = document.getElementById('fichiers-list');
  const items = data.fichiers || [];
  if (!items.length) {
    list.innerHTML = '<div class="empty"><div class="e-icon">📦</div><p>Aucun fichier disponible</p></div>';
    return;
  }
  list.innerHTML = '';
  items.forEach(item => {
    const row = document.createElement('div');
    row.className = 'fichier-row';
    row.innerHTML = `
      <div class="fichier-icon">📦</div>
      <div class="fichier-info">
        <div class="fichier-name">${item.nom}</div>
        <div class="fichier-url">${item.url}</div>
      </div>
      <button class="dl-btn">⬇ Télécharger</button>
    `;
    const btn = row.querySelector('.dl-btn');
    btn.onclick = () => {
      const a = document.createElement('a');
      a.href = item.url;
      a.download = item.nom;
      a.target = '_blank';
      a.click();
      btn.textContent = '✅ Ouvert';
      btn.classList.add('done');
    };
    list.appendChild(row);
  });
}

async function init() {
  try {
    const r = await fetch(DATA_URL);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    populateTextes(data);
    populateImages(data);
    populateFichiers(data);
    setStatus('Connecté', 'ok');
  } catch(e) {
    setStatus('Erreur de connexion', 'err');
    ['article-list','images-grid','fichiers-list'].forEach(id => {
      document.getElementById(id).innerHTML =
        `<div class="empty"><div class="e-icon">⚠️</div><p>Impossible de charger les données</p></div>`;
    });
  }
}

init();
</script>
</body>
</html>
