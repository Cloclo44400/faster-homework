<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faster Homework</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0b0d14;
  --bg2: #13161f;
  --bg3: #1c2030;
  --accent: #7c6dfa;
  --accent2: #b8aeff;
  --text: #e2e8f0;
  --dim: #4a5068;
  --success: #34d399;
  --danger: #f87171;
  --border: #252840;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  padding: 20px;
  border-bottom: 1px solid var(--border);
}

.logo span { color: var(--accent); }

.status { font-size: 0.8rem; }

.dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  display: inline-block;
  margin-right: 6px;
  background: var(--dim);
}
.dot.ok { background: var(--success); }
.dot.err { background: var(--danger); }

/* NAV */
nav {
  display: flex;
  border-bottom: 1px solid var(--border);
}

.tab-btn {
  flex: 1;
  padding: 12px;
  background: none;
  border: none;
  color: var(--dim);
  cursor: pointer;
}

.tab-btn.active {
  color: var(--accent2);
  border-bottom: 2px solid var(--accent);
}

/* MAIN */
main { padding: 20px; }

.tab-content { display: none; }
.tab-content.active { display: block; }

/* TEXTES */
.textes-layout {
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 10px;
}

.textes-list {
  background: var(--bg2);
  padding: 10px;
}

.article-btn {
  width: 100%;
  padding: 8px;
  margin-bottom: 5px;
  border: none;
  background: var(--bg3);
  color: white;
  cursor: pointer;
}

.article-btn.active { background: var(--accent); }

#text-area {
  background: var(--bg2);
  padding: 15px;
  white-space: pre-wrap;
}

/* IMAGES */
.images-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px,1fr));
  gap: 10px;
}

.img-card img {
  width: 100%;
}

/* FICHIERS */
.fichier-row {
  display: flex;
  justify-content: space-between;
  background: var(--bg2);
  padding: 10px;
  margin-bottom: 5px;
}

button {
  cursor: pointer;
}
</style>
</head>

<body>

<header>
  <div class="logo">⚡ <span>Faster</span> Homework</div>
  <div class="status">
    <span class="dot" id="dot"></span>
    <span id="status-lbl">Chargement…</span>
  </div>
</header>

<nav>
  <button class="tab-btn active" onclick="switchTab('textes', this)">Textes</button>
  <button class="tab-btn" onclick="switchTab('images', this)">Images</button>
  <button class="tab-btn" onclick="switchTab('fichiers', this)">Fichiers</button>
</nav>

<main>

<div id="tab-textes" class="tab-content active">
  <div class="textes-layout">
    <div id="article-list"></div>
    <div id="text-area">Sélectionne un texte</div>
  </div>
</div>

<div id="tab-images" class="tab-content">
  <div id="images-grid" class="images-grid"></div>
</div>

<div id="tab-fichiers" class="tab-content">
  <div id="fichiers-list"></div>
</div>

</main>

<script>
const DATA_URL = "./data.json";

function switchTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

function setStatus(txt, state) {
  document.getElementById('status-lbl').textContent = txt;
  document.getElementById('dot').className = "dot " + state;
}

async function loadText(url, btn) {
  document.querySelectorAll('.article-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const area = document.getElementById('text-area');
  area.textContent = "Chargement...";

  try {
    const r = await fetch(url);
    const txt = await r.text();
    area.textContent = txt;
  } catch {
    area.textContent = "Erreur chargement";
  }
}

async function init() {
  try {
    const r = await fetch(DATA_URL);
    const data = await r.json();

    // TEXTES
    data.textes?.forEach(t => {
      const btn = document.createElement('button');
      btn.className = 'article-btn';
      btn.textContent = t.nom;
      btn.onclick = () => loadText(t.url, btn);
      document.getElementById('article-list').appendChild(btn);
    });

    // IMAGES
    data.images?.forEach(i => {
      const div = document.createElement('div');
      div.className = "img-card";
      div.innerHTML = `<img src="${i.url}"><p>${i.nom}</p>`;
      document.getElementById('images-grid').appendChild(div);
    });

    // FICHIERS
    data.fichiers?.forEach(f => {
      const row = document.createElement('div');
      row.className = "fichier-row";
      row.innerHTML = `
        <span>${f.nom}</span>
        <button onclick="window.open('${f.url}')">Télécharger</button>
      `;
      document.getElementById('fichiers-list').appendChild(row);
    });

    setStatus("Connecté", "ok");

  } catch(e) {
    setStatus("Erreur", "err");
  }
}

init();
</script>

</body>
</html>
