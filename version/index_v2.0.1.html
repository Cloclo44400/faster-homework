<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faster Homework v2.0.1</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0b0d14;
  --bg2: #13161f;
  --bg3: #1c2030;
  --accent: #7c6dfa;
  --accent2: #b8aeff;
  --text: #e2e8f0;
  --dim: #4a5068;
  --success: #34d399;
  --danger: #f87171;
  --border: #252840;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
}
.logo { font-size: 1.2rem; font-weight: 800; }
.logo span { color: var(--accent2); }
.status { font-size: 0.8rem; display: flex; align-items: center; gap: 6px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dim); flex-shrink: 0; }
.dot.ok  { background: var(--success); }
.dot.err { background: var(--danger); }

/* NAV */
nav { display: flex; border-bottom: 1px solid var(--border); }
.tab-btn {
  flex: 1; padding: 13px 8px;
  background: none; border: none; border-bottom: 2px solid transparent;
  color: var(--dim); cursor: pointer; font-family: 'Syne', sans-serif;
  font-size: 0.9rem; transition: color .2s;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--accent2); border-bottom-color: var(--accent); }

/* MAIN */
main { padding: 24px; }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* TEXTES */
.textes-layout {
  display: grid;
  grid-template-columns: 210px 1fr;
  gap: 12px;
  height: calc(100vh - 200px);
}
.textes-list { background: var(--bg2); border-radius: 10px; padding: 10px; overflow-y: auto; }
.textes-list h3 { color: var(--accent2); font-size: 0.8rem; text-transform: uppercase; letter-spacing: .1em; padding: 8px 6px 12px; }
.article-btn {
  width: 100%; padding: 9px 12px; margin-bottom: 4px;
  border: none; border-radius: 7px; background: var(--bg3);
  color: var(--text); cursor: pointer; text-align: left;
  font-family: 'Syne', sans-serif; font-size: 0.88rem;
  transition: background .15s;
}
.article-btn:hover { background: var(--accent); }
.article-btn.active { background: var(--accent); }
#text-area {
  background: var(--bg2); border-radius: 10px;
  padding: 20px; white-space: pre-wrap; overflow-y: auto;
  font-family: 'Space Mono', monospace; font-size: 0.88rem;
  line-height: 1.7; color: var(--text);
  word-break: break-word; overflow-wrap: break-word;
}

/* ── MOBILE ── */
@media (max-width: 600px) {
  main { padding: 10px; }

  .textes-layout {
    grid-template-columns: 1fr;
    grid-template-rows: auto 1fr;
    height: calc(100vh - 160px);
    gap: 8px;
  }

  /* Liste d'articles en chips scrollables horizontalement */
  .textes-list {
    padding: 8px;
    overflow-x: auto;
    overflow-y: hidden;
    white-space: nowrap;
    border-radius: 10px;
  }
  .textes-list h3 { display: none; }

  .article-btn {
    display: inline-block;
    width: auto;
    margin-bottom: 0;
    margin-right: 6px;
    padding: 7px 16px;
    font-size: 0.82rem;
    border-radius: 20px;
    white-space: nowrap;
  }

  #text-area {
    font-size: 0.92rem;
    padding: 14px 12px;
    line-height: 1.85;
    border-radius: 10px;
    overflow-y: auto;
    height: 100%;
  }
}

/* IMAGES */
.images-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap: 12px; }
.img-card {
  background: var(--bg2); border-radius: 10px; overflow: hidden;
  cursor: pointer; transition: transform .2s, box-shadow .2s;
}
.img-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(124,109,250,.25); }
.img-card img { width: 100%; height: 160px; object-fit: cover; display: block; }
.img-card p { padding: 8px 10px; font-size: 0.82rem; color: var(--dim); }

/* LIGHTBOX */
#lightbox {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.88); z-index: 1000;
  align-items: center; justify-content: center; flex-direction: column; gap: 14px;
}
#lightbox.open { display: flex; }
#lightbox img { max-width: 90vw; max-height: 80vh; border-radius: 10px; box-shadow: 0 0 60px rgba(124,109,250,.3); }
#lightbox-caption { color: var(--dim); font-size: 0.9rem; }
#lightbox-close {
  position: absolute; top: 20px; right: 24px;
  background: none; border: none; color: var(--text);
  font-size: 2rem; cursor: pointer; line-height: 1;
}

/* FICHIERS */
.fichier-row {
  display: flex; justify-content: space-between; align-items: center;
  background: var(--bg2); border-radius: 10px;
  padding: 14px 18px; margin-bottom: 8px;
}
.fichier-info { display: flex; flex-direction: column; gap: 3px; }
.fichier-info strong { font-size: 0.95rem; }
.fichier-info small { color: var(--dim); font-size: 0.78rem; font-family: 'Space Mono', monospace; }
.dl-btn {
  background: var(--accent); color: white; border: none;
  border-radius: 7px; padding: 8px 16px; font-family: 'Syne', sans-serif;
  font-size: 0.88rem; font-weight: 600; cursor: pointer;
  transition: background .15s;
}
.dl-btn:hover { background: var(--accent2); color: var(--bg); }

/* SUGGESTIONS */
.suggestions-wrap { max-width: 560px; margin: 0 auto; padding-top: 10px; }
.suggestions-wrap h2 { color: var(--accent2); margin-bottom: 6px; font-size: 1.3rem; }
.suggestions-wrap p { color: var(--dim); font-size: 0.88rem; margin-bottom: 24px; line-height: 1.6; }

.form-group { margin-bottom: 16px; }
.form-group label { display: block; color: var(--dim); font-size: 0.82rem; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 7px; }
.form-group input,
.form-group textarea,
.form-group select {
  width: 100%; background: var(--bg2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); padding: 11px 14px;
  font-family: 'Syne', sans-serif; font-size: 0.92rem;
  outline: none; transition: border-color .2s;
  resize: vertical;
}
.form-group input:focus,
.form-group textarea:focus,
.form-group select:focus { border-color: var(--accent); }
.form-group select option { background: var(--bg2); }

.send-btn {
  width: 100%; padding: 13px;
  background: var(--accent); border: none; border-radius: 8px;
  color: white; font-family: 'Syne', sans-serif;
  font-size: 1rem; font-weight: 700; cursor: pointer;
  transition: background .15s, transform .1s;
  margin-top: 4px;
}
.send-btn:hover { background: var(--accent2); color: var(--bg); }
.send-btn:active { transform: scale(.98); }

#mail-feedback {
  margin-top: 14px; padding: 12px 16px; border-radius: 8px;
  font-size: 0.9rem; display: none;
}
#mail-feedback.ok  { background: rgba(52,211,153,.12); color: var(--success); display: block; }
#mail-feedback.err { background: rgba(248,113,113,.12); color: var(--danger);  display: block; }

.empty-state { text-align: center; color: var(--dim); padding: 60px 20px; font-size: 0.95rem; }
</style>
</head>
<body>

<header>
  <div class="logo">⚡ <span>Faster</span> Homework <small style="color:var(--dim);font-size:.7rem;margin-left:8px;">v2.0.1</small></div>
  <div class="status">
    <span class="dot" id="dot"></span>
    <span id="status-lbl">Chargement…</span>
  </div>
</header>

<nav>
  <button class="tab-btn active" onclick="switchTab('textes',this)">📄 Textes</button>
  <button class="tab-btn" onclick="switchTab('images',this)">🖼️ Images</button>
  <button class="tab-btn" onclick="switchTab('fichiers',this)">📦 Fichiers</button>
  <button class="tab-btn" onclick="switchTab('suggestions',this)">✉️ Suggestions</button>
</nav>

<main>

  <!-- TEXTES -->
  <div id="tab-textes" class="tab-content active">
    <div class="textes-layout">
      <div class="textes-list">
        <h3>Articles</h3>
        <div id="article-list"></div>
      </div>
      <div id="text-area">← Sélectionne un texte</div>
    </div>
  </div>

  <!-- IMAGES -->
  <div id="tab-images" class="tab-content">
    <div id="images-grid" class="images-grid"></div>
  </div>

  <!-- FICHIERS -->
  <div id="tab-fichiers" class="tab-content">
    <div id="fichiers-list"></div>
  </div>

  <!-- SUGGESTIONS -->
  <div id="tab-suggestions" class="tab-content">
    <div class="suggestions-wrap">
      <h2>✉️ Envoyer une suggestion</h2>
      <p>Une idée, un retour ou un problème ? Remplis le formulaire ci-dessous et ton message sera envoyé directement par mail.</p>

      <div class="form-group">
        <label>Ton prénom (optionnel)</label>
        <input type="text" id="f-nom" placeholder="Ex : Alex">
      </div>

      <div class="form-group">
        <label>Type de message</label>
        <select id="f-type">
          <option value="Suggestion">💡 Suggestion</option>
          <option value="Retour">👍 Retour positif</option>
          <option value="Problème">🐛 Problème / Bug</option>
          <option value="Autre">✏️ Autre</option>
        </select>
      </div>

      <div class="form-group">
        <label>Message *</label>
        <textarea id="f-message" rows="5" placeholder="Décris ta suggestion ou ton retour…"></textarea>
      </div>

      <button class="send-btn" onclick="sendMail()">Envoyer ✉️</button>
      <div id="mail-feedback"></div>
    </div>
  </div>

</main>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeLightbox(event)">
  <button id="lightbox-close" onclick="closeLightbox()">×</button>
  <img id="lightbox-img" src="" alt="">
  <div id="lightbox-caption"></div>
</div>

<script>
const DATA_URL = "https://raw.githubusercontent.com/Cloclo44400/faster-homework/refs/heads/main/data.json";
const MAIL_TO  = "suggestion.retoure.44@proton.me";

/* ── TAB ── */
function switchTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

function setStatus(txt, state) {
  document.getElementById('status-lbl').textContent = txt;
  document.getElementById('dot').className = "dot " + state;
}

/* ── TEXTES ── */
async function loadText(url, btn) {
  document.querySelectorAll('.article-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const area = document.getElementById('text-area');
  area.textContent = "Chargement…";
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error("HTTP " + r.status);
    area.textContent = await r.text();
  } catch(e) {
    area.textContent = "❌ Erreur : " + e.message;
  }
}

/* ── LIGHTBOX ── */
function openLightbox(src, caption) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox-caption').textContent = caption;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox(e) {
  if (e && e.target !== document.getElementById('lightbox') && e.target !== document.getElementById('lightbox-close')) return;
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(null); });

/* ── MAIL ── */
function sendMail() {
  const nom     = document.getElementById('f-nom').value.trim();
  const type    = document.getElementById('f-type').value;
  const message = document.getElementById('f-message').value.trim();
  const fb      = document.getElementById('mail-feedback');

  if (!message) {
    fb.className = 'err';
    fb.textContent = "⚠️ Le message ne peut pas être vide.";
    return;
  }

  const subject = encodeURIComponent(`[Faster Homework] ${type}${nom ? ' — ' + nom : ''}`);
  const body    = encodeURIComponent(
    `Type : ${type}\n` +
    (nom ? `De : ${nom}\n` : '') +
    `\n${message}`
  );

  window.location.href = `mailto:${MAIL_TO}?subject=${subject}&body=${body}`;

  fb.className = 'ok';
  fb.textContent = "✅ Ton client mail va s'ouvrir. Envoie le message depuis là !";
  document.getElementById('f-message').value = '';
  document.getElementById('f-nom').value = '';
}

/* ── INIT ── */
async function init() {
  try {
    const r = await fetch(DATA_URL);
    if (!r.ok) throw new Error("HTTP " + r.status);
    const data = await r.json();

    // Textes
    const textes = (data.textes || []).filter(t => t.url);
    if (textes.length === 0) {
      document.getElementById('article-list').innerHTML = '<p class="empty-state">Aucun texte disponible.</p>';
    } else {
      textes.forEach(t => {
        const btn = document.createElement('button');
        btn.className = 'article-btn';
        btn.textContent = t.nom;
        btn.onclick = () => loadText(t.url, btn);
        document.getElementById('article-list').appendChild(btn);
      });
    }

    // Images
    const images = (data.images || []).filter(i => i.url);
    const grid = document.getElementById('images-grid');
    if (images.length === 0) {
      grid.innerHTML = '<p class="empty-state">Aucune image disponible.</p>';
    } else {
      images.forEach(i => {
        const div = document.createElement('div');
        div.className = "img-card";
        div.innerHTML = `<img src="${i.url}" alt="${i.nom}" loading="lazy"><p>${i.nom}</p>`;
        div.onclick = () => openLightbox(i.url, i.nom);
        grid.appendChild(div);
      });
    }

    // Fichiers
    const fichiers = (data.fichiers || []).filter(f => f.url);
    const flist = document.getElementById('fichiers-list');
    if (fichiers.length === 0) {
      flist.innerHTML = '<p class="empty-state">Aucun fichier disponible.</p>';
    } else {
      fichiers.forEach(f => {
        const row = document.createElement('div');
        row.className = "fichier-row";
        row.innerHTML = `
          <div class="fichier-info">
            <strong>📦 ${f.nom}</strong>
            <small>${f.url}</small>
          </div>
          <button class="dl-btn" onclick="window.open('${f.url}')">⬇ Télécharger</button>
        `;
        flist.appendChild(row);
      });
    }

    setStatus("Connecté", "ok");
  } catch(e) {
    setStatus("Erreur", "err");
    console.error(e);
  }
}

init();
</script>
</body>
</html>
